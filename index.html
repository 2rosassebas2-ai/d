<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Ti 💛</title>
<style>
body { margin: 0; background: #000; color: gold; text-align: center; padding: 50px; font-family: Arial; }
canvas { display: block; margin: 20px auto; }
</style>
</head>
<body>

<h1>Para ti 🌼</h1>

<button onclick="reproducir()">▶️ Reproducir Música</button>
<button onclick="pausar()">⏸️ Pausar</button>

<br><br>

<audio id="music" style="width: 100%; max-width: 500px;">
    <source src="https://github.com/2rosassebas2-ai/flores-amarillas/raw/main/musica.mp3" type="audio/mpeg">
</audio>

<canvas id="c"></canvas>

<script>
const music = document.getElementById("music");
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

function reproducir() {
    music.play().catch(err => alert("Error: " + err));
}

function pausar() {
    music.pause();
}

// Animación simple
let stars = Array.from({length:100}, ()=>({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*2
}));

function animar(){
    ctx.fillStyle="rgba(0,0,0,0.1)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    
    ctx.fillStyle="white";
    stars.forEach(s=>{
        ctx.fillRect(s.x,s.y,s.size,s.size);
        s.y+=1;
        if(s.y>canvas.height) s.y=0;
    });
    
    requestAnimationFrame(animar);
}

animar();
</script>

</body>
</html>
