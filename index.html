<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Ti 💛</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#000;
    font-family:Arial;
}

/* Pantalla inicio */
#inicio{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    z-index:10;
}

#btn{
    padding:20px 50px;
    font-size:28px;
    background:gold;
    border:none;
    border-radius:15px;
    box-shadow:0 0 40px yellow;
    cursor:pointer;
}

/* Texto */
#titulo{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    font-size:50px;
    color:#ffd700;
    text-shadow:0 0 40px yellow;
    opacity:0;
    transition:2s;
}

#msg{
    position:absolute;
    bottom:40px;
    width:100%;
    text-align:center;
    font-size:28px;
    color:#ffd700;
}

canvas{
    display:block;
}
</style>
</head>

<body>

<div id="inicio">
    <button id="btn">Haz clic 💛</button>
</div>

<h1 id="titulo">Para ti 🌼</h1>
<div id="msg"></div>

<canvas id="c"></canvas>

<!-- 🎶 Música -->
<audio id="music" controls autoplay>
    <source src="musica.mp3" type="audio/mpeg">
    Tu navegador no soporta audio HTML5
</audio>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// ⭐ estrellas
let stars = Array.from({length:700}, ()=>({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*2,
    speed:Math.random()*1.2
}));

// 🌼 flores amarillas
let flowers = Array.from({length:120}, ()=>({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2+1,
    speed:Math.random()*0.8
}));

// 🪐 Saturno
let angle = 0;

function drawSaturn(){
    let x = canvas.width/2;
    let y = canvas.height/2;

    let grad = ctx.createRadialGradient(x,y,10,x,y,90);
    grad.addColorStop(0,"#ffe29a");
    grad.addColorStop(1,"#a67c00");

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x,y,80,0,Math.PI*2);
    ctx.fill();

    angle += 0.01;

    ctx.strokeStyle="rgba(255,255,150,0.7)";
    ctx.lineWidth=2;

    for(let i=0;i<3;i++){
        ctx.beginPath();
        ctx.ellipse(x,y,140+i*10,50+i*5,angle,0,Math.PI*2);
        ctx.stroke();
    }
}

// ⭐ estrellas
function drawStars(){
    ctx.fillStyle="white";
    stars.forEach(s=>{
        ctx.fillRect(s.x,s.y,s.size,s.size);
        s.y+=s.speed;

        if(s.y>canvas.height){
            s.y=0;
            s.x=Math.random()*canvas.width;
        }
    });
}

// 🌼 flores
function drawFlowers(){
    flowers.forEach(f=>{
        ctx.beginPath();
        ctx.fillStyle="yellow";
        ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
        ctx.fill();

        f.y-=f.speed;
        if(f.y<0){
            f.y=canvas.height;
            f.x=Math.random()*canvas.width;
        }
    });
}

// 💌 texto animado
let texto="Desde que te conocí, todo es más bonito 💛";
let i=0;

function escribir(){
    if(i<texto.length){
        document.getElementById("msg").innerHTML+=texto[i];
        i++;
        setTimeout(escribir,40);
    }
}

// 🎬 animación
function animar(){
    ctx.fillStyle="rgba(0,0,0,0.25)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    drawStars();
    drawFlowers();
    drawSaturn();

    requestAnimationFrame(animar);
}

// 🚀 inicio
document.getElementById("btn").onclick=()=>{
    document.getElementById("inicio").style.display="none";
    document.getElementById("titulo").style.opacity=1;

    let music = document.getElementById("music");
    music.volume = 0.4;
    music.play();

    escribir();
    animar();
};
</script>

</body>
</html>
